server {
    listen 3000;

    location /api/ {
        proxy_pass http://vineyard-api:8080;
        proxy_set_header Host $host;
    }

    location /swagger-ui/ {
        proxy_pass http://vineyard-api:8080;
        proxy_set_header Host $host;
    }

    location /v3/ {
        proxy_pass http://vineyard-api:8080;
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
